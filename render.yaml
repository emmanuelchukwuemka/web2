databases:
  - name: nwo-db
    databaseName: nwo
    user: nwo
    plan: free

services:
  # ── Backend ────────────────────────────────────────────────────────────────
  - type: web
    name: nwo-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nwo-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: RPC_URL
        value: https://evm.cronos.org
      - key: CHAIN_ID
        value: "25"
      - key: POLL_INTERVAL_MS
        value: "5000"
      - key: BLOCK_CHUNK_SIZE
        value: "2000"
      - key: START_BLOCK
        value: "0"
      - key: CONTROLLER_ADDRESS
        value: ""
      - key: TOKEN_FACTORY_ADDRESS
        value: ""
      - key: NFT_FACTORY_ADDRESS
        value: ""
      - key: STAKING_ADDRESS
        value: ""
      - key: WOLF_ADDRESS
        value: ""
      - key: PINATA_JWT
        sync: false
      - key: ADMIN_SECRET
        sync: false

  # ── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: nwo-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      # Private — used by Next.js rewrites (server-side proxy to backend)
      - key: BACKEND_URL
        fromService:
          name: nwo-backend
          type: web
          property: host
      # Public — used for WebSocket connection
      - key: NEXT_PUBLIC_BACKEND_URL
        fromService:
          name: nwo-backend
          type: web
          property: host
      - key: NEXT_PUBLIC_CHAIN_ID
        value: "25"
      - key: NEXT_PUBLIC_CONTROLLER_ADDRESS
        value: ""
      - key: NEXT_PUBLIC_TOKEN_FACTORY_ADDRESS
        value: ""
      - key: NEXT_PUBLIC_NFT_FACTORY_ADDRESS
        value: ""
      - key: NEXT_PUBLIC_STAKING_ADDRESS
        value: ""
      - key: NEXT_PUBLIC_WOLF_ADDRESS
        value: ""
      - key: NEXT_PUBLIC_PINATA_JWT
        sync: false
      - key: NEXT_PUBLIC_ADMIN_SECRET
        sync: false
      - key: NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID
        sync: false